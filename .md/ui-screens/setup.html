<!DOCTYPE html>

<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Undercover - Lobby</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&amp;family=Inter:wght@400&amp;family=Geist:wght@500;700&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-primary-fixed": "#320047",
            "on-primary": "#520071",
            "surface-container": "#281837",
            "on-tertiary-container": "#5a001b",
            "tertiary-fixed-dim": "#ffb2ba",
            "primary-fixed-dim": "#ecb2ff",
            "on-primary-container": "#480063",
            "on-secondary-fixed": "#001f24",
            "surface-container-high": "#332342",
            "surface-dim": "#1c0c2a",
            "surface": "#1c0c2a",
            "on-tertiary-fixed-variant": "#910030",
            "secondary-fixed-dim": "#00daf3",
            "on-tertiary-fixed": "#400011",
            "primary-fixed": "#f8d8ff",
            "tertiary": "#ffb2ba",
            "surface-container-highest": "#3f2e4e",
            "background": "#1c0c2a",
            "on-surface-variant": "#d3c1d4",
            "surface-container-lowest": "#160625",
            "secondary": "#bdf4ff",
            "tertiary-container": "#ff4f73",
            "primary": "#ecb2ff",
            "on-secondary": "#00363d",
            "error-container": "#93000a",
            "inverse-primary": "#9324c0",
            "surface-bright": "#433252",
            "on-background": "#f1dbff",
            "surface-variant": "#3f2e4e",
            "on-surface": "#f1dbff",
            "on-tertiary": "#670020",
            "on-secondary-fixed-variant": "#004f58",
            "on-error": "#690005",
            "tertiary-fixed": "#ffd9dc",
            "outline": "#9b8c9d",
            "error": "#ffb4ab",
            "on-secondary-container": "#00616d",
            "surface-tint": "#ecb2ff",
            "inverse-surface": "#f1dbff",
            "secondary-container": "#00e3fd",
            "primary-container": "#cb61f8",
            "outline-variant": "#4f4352",
            "surface-container-low": "#241433",
            "on-primary-fixed-variant": "#74009f",
            "secondary-fixed": "#9cf0ff",
            "on-error-container": "#ffdad6",
            "inverse-on-surface": "#3a2949"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "md": "16px",
            "lg": "24px",
            "xs": "4px",
            "unit": "4px",
            "xl": "40px",
            "stack-gap": "12px",
            "container-margin": "20px",
            "sm": "8px"
          },
          "fontFamily": {
            "headline-lg": ["Sora"],
            "headline-xl": ["Sora"],
            "headline-lg-mobile": ["Sora"],
            "headline-md": ["Sora"],
            "body-md": ["Inter"],
            "label-caps": ["Geist"],
            "label-mono": ["Geist"],
            "body-lg": ["Inter"]
          },
          "fontSize": {
            "headline-lg": ["32px", { "lineHeight": "38px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
            "headline-xl": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
            "headline-lg-mobile": ["28px", { "lineHeight": "34px", "fontWeight": "700" }],
            "headline-md": ["24px", { "lineHeight": "30px", "fontWeight": "600" }],
            "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
            "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700" }],
            "label-mono": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
            "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
          }
        }
      }
    }
  </script>
  <style>
    .glass-panel {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .neon-glow-primary {
      filter: drop-shadow(0 0 12px rgba(236, 178, 255, 0.5));
    }

    .neon-border-glow {
      box-shadow: 0 0 12px rgba(236, 178, 255, 0.3);
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 24px;
      width: 24px;
      border-radius: 50%;
      background: #00daf3;
      box-shadow: 0 0 10px #00daf3;
      cursor: pointer;
      margin-top: -10px;
    }

    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      cursor: pointer;
      background: #4f4352;
      border-radius: 2px;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="bg-background text-on-surface min-h-screen relative overflow-hidden pb-32">
  <!-- Background Shader -->

  <!-- Top Navigation App Bar -->
  <header
    class="fixed top-0 w-full z-50 bg-surface-container/60 backdrop-blur-xl border-b border-white/10 shadow-none flex justify-between items-center px-container-margin py-md">
    <button class="text-primary hover:opacity-80 transition-opacity active:scale-95 flex items-center justify-center">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">security</span>
    </button>
    <h1
      class="font-headline-lg-mobile text-headline-lg-mobile tracking-tighter text-primary drop-shadow-[0_0_8px_rgba(236,178,255,0.5)]">
      UNDERCOVER
    </h1>
    <button
      class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 flex items-center justify-center">
      <span class="material-symbols-outlined">settings</span>
    </button>
  </header>
  <!-- Main Content -->
  <main
    class="relative z-10 pt-28 px-container-margin md:px-xl max-w-4xl mx-auto flex flex-col gap-lg items-center justify-center min-h-[707px]">
    <!-- Segmented Control -->
    <div class="glass-panel p-1 rounded-full flex w-full max-w-md">
      <button
        class="flex-1 py-2 px-4 rounded-full bg-primary-container text-on-primary-container font-label-caps text-label-caps neon-border-glow transition-all">
        Local Pass &amp; Play
      </button>
      <button
        class="flex-1 py-2 px-4 rounded-full text-on-surface-variant font-label-caps text-label-caps hover:text-on-surface transition-all">
        Online Room
      </button>
    </div>
    <!-- Game Setup Form Container -->
    <section class="glass-panel w-full max-w-md rounded-xl p-lg flex flex-col gap-lg">
      <h2 class="font-headline-md text-headline-md text-on-surface text-center">Game Setup</h2>
      <!-- Category Selection -->
      <div class="flex flex-col gap-sm">
        <label class="font-label-mono text-label-mono text-on-surface-variant">Word Category</label>
        <div class="flex gap-sm overflow-x-auto pb-2 scrollbar-hide -mx-2 px-2">
          <button
            class="shrink-0 px-4 py-2 rounded-full border border-secondary text-secondary drop-shadow-[0_0_8px_rgba(0,218,243,0.5)] font-label-caps text-label-caps bg-secondary/10">Food</button>
          <button
            class="shrink-0 px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:text-on-surface hover:border-outline font-label-caps text-label-caps transition-colors">Movies</button>
          <button
            class="shrink-0 px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:text-on-surface hover:border-outline font-label-caps text-label-caps transition-colors">Places</button>
          <button
            class="shrink-0 px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:text-on-surface hover:border-outline font-label-caps text-label-caps transition-colors">Tech</button>
          <button
            class="shrink-0 px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:text-on-surface hover:border-outline font-label-caps text-label-caps transition-colors">Random</button>
        </div>
      </div>
      <!-- Player Slider -->
      <div class="flex flex-col gap-sm">
        <div class="flex justify-between items-center">
          <label class="font-label-mono text-label-mono text-on-surface-variant" for="player-count">Number of
            Players</label>
          <span class="font-headline-md text-headline-md text-secondary drop-shadow-[0_0_8px_rgba(0,218,243,0.5)]"
            id="player-count-display">6</span>
        </div>
        <input class="w-full h-1 bg-outline-variant rounded-lg appearance-none cursor-pointer" id="player-count"
          max="20" min="3" type="range" value="6" />
        <div class="flex justify-between text-on-surface-variant opacity-50 font-label-mono text-label-caps mt-1">
          <span>3</span>
          <span>20</span>
        </div>
      </div>
      <!-- Player Names -->
      <div class="flex flex-col gap-sm">
        <label class="font-label-mono text-label-mono text-on-surface-variant">Player Names</label>
        <div class="grid grid-cols-2 gap-sm">
          <input
            class="w-full bg-surface-container/50 border border-white/10 rounded-lg p-2 text-on-surface font-body-md focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary/50 focus:drop-shadow-[0_0_4px_rgba(0,218,243,0.3)] transition-all glass-panel"
            type="text" value="Player 1" />
          <input
            class="w-full bg-surface-container/50 border border-white/10 rounded-lg p-2 text-on-surface font-body-md focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary/50 focus:drop-shadow-[0_0_4px_rgba(0,218,243,0.3)] transition-all glass-panel"
            type="text" value="Player 2" />
          <input
            class="w-full bg-surface-container/50 border border-white/10 rounded-lg p-2 text-on-surface font-body-md focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary/50 focus:drop-shadow-[0_0_4px_rgba(0,218,243,0.3)] transition-all glass-panel"
            type="text" value="Player 3" />
          <input
            class="w-full bg-surface-container/50 border border-white/10 rounded-lg p-2 text-on-surface font-body-md focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary/50 focus:drop-shadow-[0_0_4px_rgba(0,218,243,0.3)] transition-all glass-panel"
            type="text" value="Player 4" />
          <input
            class="w-full bg-surface-container/50 border border-white/10 rounded-lg p-2 text-on-surface font-body-md focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary/50 focus:drop-shadow-[0_0_4px_rgba(0,218,243,0.3)] transition-all glass-panel"
            type="text" value="Player 5" />
          <input
            class="w-full bg-surface-container/50 border border-white/10 rounded-lg p-2 text-on-surface font-body-md focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary/50 focus:drop-shadow-[0_0_4px_rgba(0,218,243,0.3)] transition-all glass-panel"
            type="text" value="Player 6" />
        </div>
      </div>
      <!-- Role Distribution Badges -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-sm mt-sm">
        <div
          class="glass-panel rounded-lg p-sm flex flex-col items-center justify-center gap-xs border-secondary/30 relative overflow-hidden group">
          <div class="absolute inset-0 bg-secondary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
          <span class="material-symbols-outlined text-secondary text-2xl"
            style="font-variation-settings: 'FILL' 1;">groups</span>
          <span class="font-label-caps text-label-caps text-on-surface-variant">Civilians</span>
          <span class="font-headline-md text-headline-md text-secondary">4</span>
        </div>
        <div
          class="glass-panel rounded-lg p-sm flex flex-col items-center justify-center gap-xs border-error/30 relative overflow-hidden group">
          <div class="absolute inset-0 bg-error/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
          <span class="material-symbols-outlined text-error text-2xl"
            style="font-variation-settings: 'FILL' 1;">visibility_off</span>
          <span class="font-label-caps text-label-caps text-on-surface-variant">Undercover</span>
          <span class="font-headline-md text-headline-md text-error">1</span>
        </div>
        <div
          class="glass-panel rounded-lg p-sm flex flex-col items-center justify-center gap-xs border-tertiary-container/30 relative overflow-hidden group">
          <div class="absolute inset-0 bg-tertiary-container/5 opacity-0 group-hover:opacity-100 transition-opacity">
          </div>
          <span class="material-symbols-outlined text-tertiary-container text-2xl"
            style="font-variation-settings: 'FILL' 1;">person_off</span>
          <span class="font-label-caps text-label-caps text-on-surface-variant text-center">Mr. White</span>
          <span class="font-headline-md text-headline-md text-tertiary-container">1</span>
        </div>
      </div>
    </section>
    <!-- Impostor Hint Toggle -->
    <div class="w-full max-w-md glass-panel rounded-xl p-md flex items-center justify-between gap-md mt-md">
      <div class="flex flex-col gap-xs">
        <span class="font-label-mono text-label-mono text-on-surface">Give Impostor a Hint</span>
        <span class="font-body-md text-sm text-on-surface-variant leading-tight">Helps Mr. White blend in by providing a
          category hint.</span>
      </div>
      <label class="relative inline-flex items-center cursor-pointer shrink-0">
        <input checked="" class="sr-only peer" type="checkbox" value="" />
        <div
          class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-secondary drop-shadow-[0_0_4px_rgba(0,218,243,0.5)]">
        </div>
      </label>
    </div>
    <!-- Start Button -->
    <button
      class="w-full max-w-md bg-primary text-on-primary-fixed font-headline-md text-headline-md py-4 px-8 rounded-xl neon-glow-primary active:scale-95 transition-transform mt-md flex items-center justify-center gap-sm">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
      START GAME
    </button>
  </main>
  <!-- Bottom Navigation Bar (Mobile Only) -->
  <nav
    class="md:hidden fixed bottom-0 w-full z-50 rounded-t-xl bg-surface-container-lowest/80 backdrop-blur-2xl border-t border-white/5 shadow-[0_-4px_20px_rgba(0,0,0,0.5)] flex justify-around items-center h-20 px-4 pb-safe">
    <button
      class="flex flex-col items-center justify-center text-secondary drop-shadow-[0_0_10px_rgba(0,218,243,0.6)] font-bold active:scale-90 transition-all duration-150">
      <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">groups</span>
      <span class="font-label-caps text-label-caps">Lobby</span>
    </button>
    <button
      class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-secondary/80 active:scale-90 transition-all duration-150">
      <span class="material-symbols-outlined mb-1">terminal</span>
      <span class="font-label-caps text-label-caps">Intel</span>
    </button>
    <button
      class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-secondary/80 active:scale-90 transition-all duration-150">
      <span class="material-symbols-outlined mb-1">emergency_home</span>
      <span class="font-label-caps text-label-caps">Sabotage</span>
    </button>
    <button
      class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-secondary/80 active:scale-90 transition-all duration-150">
      <span class="material-symbols-outlined mb-1">account_circle</span>
      <span class="font-label-caps text-label-caps">Profile</span>
    </button>
  </nav>
  <script>
    const slider = document.getElementById('player-count');
    const display = document.getElementById('player-count-display');

    slider.addEventListener('input', (e) => {
      display.textContent = e.target.value;
      // Basic logic to update roles visually based on player count could go here
    });
  </script>
</body>

</html>
