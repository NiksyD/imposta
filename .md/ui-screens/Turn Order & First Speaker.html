<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Undercover - Turn Order</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Sora:wght@400;600;700;800&amp;family=Geist:wght@500;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#ecb2ff",
                        "inverse-primary": "#9324c0",
                        "secondary-container": "#00e3fd",
                        "surface-container-lowest": "#160625",
                        "on-primary-container": "#480063",
                        "outline": "#9b8c9d",
                        "surface-variant": "#3f2e4e",
                        "surface": "#1c0c2a",
                        "surface-container-high": "#332342",
                        "on-tertiary-container": "#5a001b",
                        "surface-container": "#281837",
                        "on-tertiary-fixed": "#400011",
                        "tertiary-container": "#ff4f73",
                        "inverse-surface": "#f1dbff",
                        "background": "#1c0c2a",
                        "outline-variant": "#4f4352",
                        "on-primary-fixed": "#320047",
                        "on-tertiary-fixed-variant": "#910030",
                        "inverse-on-surface": "#3a2949",
                        "on-surface": "#f1dbff",
                        "on-secondary-fixed": "#001f24",
                        "tertiary": "#ffb2ba",
                        "on-secondary": "#00363d",
                        "on-secondary-container": "#00616d",
                        "on-primary": "#520071",
                        "on-error": "#690005",
                        "tertiary-fixed": "#ffd9dc",
                        "surface-bright": "#433252",
                        "surface-dim": "#1c0c2a",
                        "on-error-container": "#ffdad6",
                        "error": "#ffb4ab",
                        "secondary-fixed-dim": "#00daf3",
                        "primary-container": "#cb61f8",
                        "primary": "#ecb2ff",
                        "primary-fixed-dim": "#ecb2ff",
                        "error-container": "#93000a",
                        "secondary": "#bdf4ff",
                        "surface-container-highest": "#3f2e4e",
                        "surface-container-low": "#241433",
                        "on-background": "#f1dbff",
                        "on-primary-fixed-variant": "#74009f",
                        "tertiary-fixed-dim": "#ffb2ba",
                        "secondary-fixed": "#9cf0ff",
                        "primary-fixed": "#f8d8ff",
                        "on-tertiary": "#670020",
                        "on-surface-variant": "#d3c1d4",
                        "on-secondary-fixed-variant": "#004f58"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "40px",
                        "unit": "4px",
                        "lg": "24px",
                        "md": "16px",
                        "container-margin": "20px",
                        "xs": "4px",
                        "stack-gap": "12px",
                        "sm": "8px",
                        "safe": "env(safe-area-inset-bottom)"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-mono": ["Geist"],
                        "headline-md": ["Sora"],
                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Sora"],
                        "label-caps": ["Geist"],
                        "headline-lg": ["Sora"],
                        "headline-xl": ["Sora"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-mono": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "30px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "34px", "fontWeight": "700" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "38px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "headline-xl": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800" }]
                    }
                },
            },
        }
    </script>
    <style>
        /* Pulse Animation for Active Speaker */
        @keyframes cyber-pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(236, 178, 255, 0.4);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(236, 178, 255, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(236, 178, 255, 0);
            }
        }

        .animate-cyber-pulse {
            animation: cyber-pulse 2s infinite;
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-panel-active {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid theme('colors.primary');
            box-shadow: 0 0 8px theme('colors.primary');
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen relative overflow-x-hidden font-body-md text-body-md">
    <!-- Ambient Shader Background -->

    <!-- TopAppBar -->
    <header
        class="bg-surface-container/60 backdrop-blur-xl shadow-none flex justify-between items-center px-container-margin py-md fixed top-0 w-full z-50">
        <button
            class="text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform flex items-center justify-center p-2 rounded-full">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">security</span>
        </button>
        <h1
            class="font-headline-lg-mobile text-headline-lg-mobile tracking-tighter text-primary drop-shadow-[0_0_8px_rgba(236,178,255,0.5)]">
            UNDERCOVER</h1>
        <button
            class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform flex items-center justify-center p-2 rounded-full">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span>
        </button>
    </header>
    <!-- Main Content Area -->
    <main class="pt-[90px] pb-[160px] px-container-margin max-w-lg mx-auto flex flex-col gap-lg">
        <!-- Headline -->
        <div class="text-center mt-md">
            <h2 class="font-headline-md text-headline-md text-on-surface">The game begins...</h2>
        </div>
        <!-- First Speaker Featured Card -->
        <section
            class="glass-panel-active rounded-xl p-md flex flex-col items-center gap-md relative overflow-hidden animate-cyber-pulse">
            <!-- Decorative Background Element -->
            <div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent pointer-events-none"></div>
            <div
                class="flex items-center justify-center gap-sm bg-surface-container/50 px-3 py-1 rounded-full border border-secondary/30 shadow-[0_0_8px_rgba(0,218,243,0.3)]">
                <span class="material-symbols-outlined text-secondary text-sm">record_voice_over</span>
                <span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest">First
                    Speaker</span>
            </div>
            <div
                class="w-24 h-24 rounded-full overflow-hidden border-2 border-primary shadow-[0_0_12px_theme('colors.primary')]">
                <img class="w-full h-full object-cover"
                    data-alt="A striking digital portrait avatar of a mysterious cyberpunk character named Neo. Glowing neon purple and cyan lighting accentuates the character's facial features. The background is a dark, abstract digital void. High-tech, futuristic aesthetic."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3hqq7sz4DnUm2wW8rwO4-xiJAXbjRywLy_yqEpfi1foPD6oZNrepTH4BP6AoKnpQJHCqgVcycQ9XT6MfFlkQjK-bmvxHpfnOmytDAbglHk5U-x54GDb60hoXqQAf6IqZytQwCYwRQvMjM80OfL5mI3XiTHwfpV36-NcmLKiVd32gwpzNAhi7oMqGCnv_QbrGi_c1tu8QBxFxlBTEkfocjsFsDS9GhZQP4RVyXBtyQSxqXqmx5BGsL" />
            </div>
            <div class="text-center z-10">
                <h3 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Neo</h3>
                <p class="font-body-md text-body-md text-on-surface-variant opacity-80">Starting the conversation...</p>
            </div>
        </section>
        <!-- Turn Order Stepper -->
        <section class="flex flex-col mt-sm">
            <h4 class="font-label-caps text-label-caps text-outline uppercase tracking-widest mb-4 ml-2">Turn Sequence
            </h4>
            <div class="relative pl-6 flex flex-col gap-0">
                <!-- Stepper Line -->
                <div
                    class="absolute left-[29px] top-[24px] bottom-[24px] w-[2px] bg-secondary/30 rounded-full shadow-[0_0_5px_theme('colors.secondary')]">
                </div>
                <!-- Player 1 (Active) -->
                <div class="flex items-center gap-md relative py-sm">
                    <div
                        class="z-10 w-4 h-4 rounded-full bg-secondary shadow-[0_0_10px_theme('colors.secondary')] -ml-[23px] shrink-0 border-2 border-background">
                    </div>
                    <div class="glass-panel-active rounded-lg p-3 flex-1 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full overflow-hidden border border-primary/50">
                                <img class="w-full h-full object-cover"
                                    data-alt="A small avatar of a mysterious cyberpunk character named Neo. Glowing neon purple and cyan lighting."
                                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuArxTqACDqutFd3bJZqRv2wJa0fp3IdLqM5ZMjC1IBpd4IAkbVfOtcbDSWoW4Fl1DSrGGLpvxG8JuS2n8lOTuWBs5Djjlrfv39fFKrHiRr6pHNhhp6OoI-AF4AegFtdhN1zQz2ESj3JgYL7fNXLDBGbT_9UUTlNkJp8AdSl5DL98QKd0488R2CBdLdDuwitpzXiTmqwJrO6NQBugT2SxB4768Dfv23Q0xFfqX8SXK4Bito0RFLILrgD" />
                            </div>
                            <span class="font-headline-md text-headline-md text-on-surface text-lg">Neo</span>
                        </div>
                        <span class="font-label-mono text-label-mono text-primary">01</span>
                    </div>
                </div>
                <!-- Player 2 -->
                <div class="flex items-center gap-md relative py-sm opacity-80">
                    <div class="z-10 w-3 h-3 rounded-full bg-surface-variant border border-outline -ml-[21px] shrink-0">
                    </div>
                    <div class="glass-panel rounded-lg p-3 flex-1 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div
                                class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center border border-outline/30">
                                <span class="material-symbols-outlined text-outline">person</span>
                            </div>
                            <span class="font-body-lg text-body-lg text-on-surface">Trinity</span>
                        </div>
                        <span class="font-label-mono text-label-mono text-outline">02</span>
                    </div>
                </div>
                <!-- Player 3 -->
                <div class="flex items-center gap-md relative py-sm opacity-70">
                    <div class="z-10 w-3 h-3 rounded-full bg-surface-variant border border-outline -ml-[21px] shrink-0">
                    </div>
                    <div class="glass-panel rounded-lg p-3 flex-1 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div
                                class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center border border-outline/30">
                                <span class="material-symbols-outlined text-outline">person</span>
                            </div>
                            <span class="font-body-lg text-body-lg text-on-surface">Morpheus</span>
                        </div>
                        <span class="font-label-mono text-label-mono text-outline">03</span>
                    </div>
                </div>
                <!-- Player 4 -->
                <div class="flex items-center gap-md relative py-sm opacity-60">
                    <div class="z-10 w-3 h-3 rounded-full bg-surface-variant border border-outline -ml-[21px] shrink-0">
                    </div>
                    <div class="glass-panel rounded-lg p-3 flex-1 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div
                                class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center border border-outline/30">
                                <span class="material-symbols-outlined text-outline">person</span>
                            </div>
                            <span class="font-body-lg text-body-lg text-on-surface">Cypher</span>
                        </div>
                        <span class="font-label-mono text-label-mono text-outline">04</span>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <!-- Bottom Action Button Container (Above Nav) -->
    <div class="fixed bottom-[100px] w-full px-container-margin max-w-lg left-1/2 -translate-x-1/2 z-40">
        <button
            class="w-full bg-inverse-primary text-on-primary font-headline-md text-headline-md py-4 rounded-xl shadow-[0_0_15px_rgba(147,36,192,0.6)] active:scale-95 transition-all duration-150 flex items-center justify-center gap-sm">
            <span>ENTER DISCUSSION</span>
            <span class="material-symbols-outlined">forum</span>
        </button>
    </div>
    <!-- BottomNavBar -->
    <nav
        class="bg-surface-container-lowest/80 backdrop-blur-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.5)] flex justify-around items-center h-20 px-4 pb-safe fixed bottom-0 w-full z-50 rounded-t-xl border-t border-white/5">
        <!-- Tab 1: Lobby (Active) -->
        <button
            class="flex flex-col items-center justify-center text-secondary drop-shadow-[0_0_10px_rgba(0,218,243,0.6)] font-bold hover:text-secondary/80 active:scale-90 transition-all duration-150 w-16">
            <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">groups</span>
            <span class="font-label-caps text-label-caps uppercase text-[10px]">Lobby</span>
        </button>
        <!-- Tab 2: Intel (Inactive) -->
        <button
            class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-secondary/80 active:scale-90 transition-all duration-150 w-16">
            <span class="material-symbols-outlined mb-1">terminal</span>
            <span class="font-label-caps text-label-caps uppercase text-[10px]">Intel</span>
        </button>
        <!-- Tab 3: Sabotage (Inactive) -->
        <button
            class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-secondary/80 active:scale-90 transition-all duration-150 w-16">
            <span class="material-symbols-outlined mb-1">emergency_home</span>
            <span class="font-label-caps text-label-caps uppercase text-[10px]">Sabotage</span>
        </button>
        <!-- Tab 4: Profile (Inactive) -->
        <button
            class="flex flex-col items-center justify-center text-on-surface-variant/60 hover:text-secondary/80 active:scale-90 transition-all duration-150 w-16">
            <span class="material-symbols-outlined mb-1">account_circle</span>
            <span class="font-label-caps text-label-caps uppercase text-[10px]">Profile</span>
        </button>
    </nav>
</body>

</html>
